<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorial Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #e0e0e0; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: #2a2a2a; border-bottom: 1px solid #3a3a3a;
      font-size: 13px;
    }
    .top-bar h1 { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-bar-meta { font-size: 11px; color: #888; white-space: nowrap; }
    .top-bar a {
      color: #68a; text-decoration: none; font-size: 12px; white-space: nowrap;
    }
    .top-bar a:hover { color: #8bf; text-decoration: underline; }

    .simulator-frame { flex: 1; border: none; background: #1a1a1a; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #888; font-size: 14px;
    }
    .error { color: #c44; padding: 40px; text-align: center; }
    .error code { display: block; margin-top: 8px; color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <h1 id="title">Loading...</h1>
      <span class="top-bar-meta" id="meta"></span>
      <a href="index.html">All Tutorials</a>
    </div>
    <iframe id="simulator" class="simulator-frame" src="/"></iframe>
  </div>

  <script>
    // This page lives at /<base>/app/tutorial/view.html — resolve manifest paths
    // (callers pass root-relative paths like "tutorials/foo/manifest.json")
    // against the deploy root so they work regardless of page depth and so that
    // the absolute basePath we forward to the simulator iframe resolves cleanly.
    const DEPLOY_ROOT = new URL('../../', location.href).href;
    const iframe = document.getElementById('simulator');
    const params = new URLSearchParams(window.location.search);
    const rawManifest = params.get('manifest') || 'tutorials/sr-to-flipflop/manifest.json';
    const manifestUrl = new URL(rawManifest, DEPLOY_ROOT).href;
    let manifest = null;

    async function init() {
      try {
        const res = await fetch(manifestUrl);
        if (!res.ok) throw new Error(`Failed to load manifest: ${res.statusText}`);
        manifest = await res.json();

        document.getElementById('title').textContent = manifest.title;
        document.title = manifest.title;

        const meta = [];
        if (manifest.difficulty) meta.push(manifest.difficulty);
        if (manifest.estimatedMinutes) meta.push(`~${manifest.estimatedMinutes} min`);
        if (manifest.steps) meta.push(`${manifest.steps.length} steps`);
        document.getElementById('meta').textContent = meta.join(' · ');
      } catch (err) {
        document.getElementById('title').textContent = 'Error';
        document.getElementById('meta').textContent = err.message;
      }
    }

    // Wait for simulator to be ready, then send the manifest
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;

      switch (data.type) {
        case 'sim-ready':
          if (manifest) {
            // Attach base path so the runner can resolve relative .dig file paths
            const basePath = manifestUrl.substring(0, manifestUrl.lastIndexOf('/') + 1);
            iframe.contentWindow.postMessage({
              type: 'sim-load-tutorial',
              manifest: manifest,
              basePath: basePath,
            }, '*');
          }
          break;

        case 'sim-tutorial-loaded':
          // Tutorial runner is active inside the iframe
          break;

        case 'sim-tutorial-step-changed':
          // Update page title with step info
          if (manifest) {
            document.title = `${data.title} — ${manifest.title}`;
          }
          break;

        case 'sim-tutorial-check-result':
          // Could show a toast or update the top bar — for now just log
          break;
      }
    });

    init();
  </script>
</body>
</html>
