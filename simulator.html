<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Simulator</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --fg: #d4d4d4;
      --panel-bg: #252526;
      --panel-border: #3c3c3c;
      --toolbar-bg: #333333;
      --toolbar-border: #444444;
      --accent: #569cd6;
      --wire-low: #4a9e4a;
      --wire-high: #e8e84a;
      --wire-float: #888888;
      --wire-error: #e84a4a;
      --canvas-bg: #1e1e1e;
      --grid-color: #2d2d2d;
    }
    html.light {
      --bg: #f5f5f5;
      --fg: #1e1e1e;
      --panel-bg: #ffffff;
      --panel-border: #cccccc;
      --toolbar-bg: #e8e8e8;
      --toolbar-border: #cccccc;
      --accent: #0066cc;
      --wire-low: #228b22;
      --wire-high: #cc9900;
      --wire-float: #999999;
      --wire-error: #cc0000;
      --canvas-bg: #ffffff;
      --grid-color: #e0e0e0;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* -------------------------------------------------------------------------
       Menu bar
    ------------------------------------------------------------------------- */
    #menu-bar {
      display: flex;
      align-items: center;
      height: 28px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-border);
      flex-shrink: 0;
      user-select: none;
      position: relative;
      z-index: 200;
    }

    /* Menu items (top-level) */
    .menu-item {
      position: relative;
    }
    .menu-item > .menu-label {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 28px;
      cursor: pointer;
      font-size: 13px;
      color: var(--fg);
      white-space: nowrap;
    }
    .menu-item > .menu-label:hover,
    .menu-item.open > .menu-label {
      background: var(--accent);
      color: #fff;
    }

    /* Dropdown panel */
    .menu-dropdown {
      display: none;
      position: absolute;
      top: 28px;
      left: 0;
      min-width: 180px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 300;
      padding: 2px 0;
    }
    .menu-item.open > .menu-dropdown {
      display: block;
    }

    /* Dropdown entries */
    .menu-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px 4px 12px;
      cursor: pointer;
      color: var(--fg);
      font-size: 13px;
      white-space: nowrap;
      gap: 24px;
    }
    .menu-entry:hover {
      background: var(--accent);
      color: #fff;
    }
    .menu-entry-shortcut {
      font-size: 11px;
      opacity: 0.65;
      margin-left: auto;
    }
    .menu-entry:hover .menu-entry-shortcut {
      opacity: 0.85;
    }

    /* Separator inside dropdown */
    .menu-separator {
      height: 1px;
      background: var(--panel-border);
      margin: 3px 0;
    }

    /* Circuit name field — right of the menu items */
    #circuit-name-field {
      margin-left: 16px;
      font-size: 13px;
      color: var(--fg);
      opacity: 0.8;
      cursor: text;
      padding: 1px 6px;
      border: 1px solid transparent;
      border-radius: 3px;
      background: transparent;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 80px;
    }
    #circuit-name-field:hover {
      border-color: var(--panel-border);
    }
    #circuit-name-field:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--panel-bg);
      opacity: 1;
    }

    /* Speed control group — pushed to the right */
    #menu-speed-group {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
      padding-right: 8px;
    }
    #menu-speed-group button {
      padding: 1px 6px;
      background: transparent;
      border: 1px solid var(--toolbar-border);
      color: var(--fg);
      cursor: pointer;
      border-radius: 3px;
      font-size: 11px;
      height: 20px;
      line-height: 1;
    }
    #menu-speed-group button:hover {
      background: var(--panel-border);
    }
    #menu-speed-group input {
      width: 56px;
      padding: 1px 4px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--fg);
      border-radius: 3px;
      font-size: 11px;
      text-align: center;
      height: 20px;
    }
    #menu-speed-label {
      font-size: 11px;
      color: var(--fg);
      opacity: 0.6;
      margin-right: 2px;
    }

    /* -------------------------------------------------------------------------
       Workspace
    ------------------------------------------------------------------------- */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #palette-panel {
      width: 200px;
      background: var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    #palette-panel .panel-header {
      padding: 6px 8px;
      font-weight: 600;
      border-bottom: 1px solid var(--panel-border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg);
      opacity: 0.7;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #sim-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: var(--canvas-bg);
      cursor: default;
    }
    #property-panel {
      display: none;
    }
    .prop-popup {
      position: absolute;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      padding: 8px;
      min-width: 180px;
      max-width: 280px;
      z-index: 100;
    }
    .prop-popup .prop-popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0 6px 0;
      border-bottom: 1px solid var(--panel-border);
      margin-bottom: 4px;
    }
    .prop-popup .prop-popup-title {
      font-weight: 600;
      font-size: 12px;
      color: var(--fg);
    }
    .prop-popup .prop-popup-close {
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      opacity: 0.6;
    }
    .prop-popup .prop-popup-close:hover {
      opacity: 1;
    }
    .panels-none #palette-panel,
    .panels-none #property-panel {
      display: none;
    }

    /* -------------------------------------------------------------------------
       Palette styles
    ------------------------------------------------------------------------- */
    .palette-search {
      padding: 5px 8px;
      border-bottom: 1px solid var(--panel-border);
    }
    .palette-search-input {
      width: 100%;
      padding: 3px 6px;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      color: var(--fg);
      border-radius: 3px;
      font-size: 12px;
    }
    .palette-category-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--fg);
      opacity: 0.8;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
    }
    .palette-category-header:hover {
      background: var(--toolbar-bg);
    }
    .palette-category-arrow {
      display: inline-block;
      width: 10px;
      font-size: 10px;
      flex-shrink: 0;
      line-height: 1;
    }
    .palette-component-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .palette-component-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .palette-component-item:hover {
      background: var(--accent);
      color: #fff;
    }
    .palette-component-icon {
      display: block;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 2px;
    }
    .palette-component-icon--placeholder {
      width: 24px;
      height: 24px;
      border: 1px solid var(--panel-border);
      border-radius: 2px;
      background: transparent;
    }
    .palette-component-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    /* -------------------------------------------------------------------------
       Property panel styles
    ------------------------------------------------------------------------- */
    .prop-row {
      display: flex;
      flex-direction: column;
      padding: 4px 8px;
      border-bottom: 1px solid var(--panel-border);
    }
    .prop-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--fg);
      opacity: 0.7;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .prop-row input, .prop-row select {
      width: 100%;
      padding: 2px 4px;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      color: var(--fg);
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Menu bar -->
    <div id="menu-bar">

      <!-- File menu -->
      <div class="menu-item" id="menu-file">
        <div class="menu-label">File</div>
        <div class="menu-dropdown">
          <div class="menu-entry" id="menu-new">
            <span>New</span>
          </div>
          <div class="menu-separator"></div>
          <div class="menu-entry" id="menu-open">
            <span>Open...</span>
          </div>
          <div class="menu-separator"></div>
          <div class="menu-entry" id="menu-save">
            <span>Save</span>
            <span class="menu-entry-shortcut">Ctrl+S</span>
          </div>
          <div class="menu-entry" id="menu-save-as">
            <span>Save As...</span>
            <span class="menu-entry-shortcut">Ctrl+Shift+S</span>
          </div>
        </div>
      </div>

      <!-- Edit menu -->
      <div class="menu-item" id="menu-edit">
        <div class="menu-label">Edit</div>
        <div class="menu-dropdown">
          <div class="menu-entry" id="menu-undo">
            <span>Undo</span>
            <span class="menu-entry-shortcut">Ctrl+Z</span>
          </div>
          <div class="menu-entry" id="menu-redo">
            <span>Redo</span>
            <span class="menu-entry-shortcut">Ctrl+Y</span>
          </div>
          <div class="menu-separator"></div>
          <div class="menu-entry" id="menu-delete">
            <span>Delete</span>
            <span class="menu-entry-shortcut">Del</span>
          </div>
          <div class="menu-entry" id="menu-select-all">
            <span>Select All</span>
            <span class="menu-entry-shortcut">Ctrl+A</span>
          </div>
        </div>
      </div>

      <!-- Simulation menu -->
      <div class="menu-item" id="menu-sim">
        <div class="menu-label">Simulation</div>
        <div class="menu-dropdown">
          <div class="menu-entry" id="menu-step">
            <span>Step</span>
          </div>
          <div class="menu-entry" id="menu-run">
            <span>Run</span>
          </div>
          <div class="menu-entry" id="menu-stop">
            <span>Stop</span>
          </div>
        </div>
      </div>

      <!-- Circuit name editable field -->
      <input id="circuit-name-field" type="text" value="Untitled" spellcheck="false" title="Circuit name (click to edit)" />

      <!-- Speed controls pushed to the right -->
      <div id="menu-speed-group">
        <span id="menu-speed-label">Speed:</span>
        <button id="btn-speed-div10" title="Speed ÷ 10">/10</button>
        <button id="btn-speed-div2" title="Speed ÷ 2">/2</button>
        <input id="speed-input" type="text" value="1000" title="Steps per second" />
        <button id="btn-speed-mul2" title="Speed × 2">×2</button>
        <button id="btn-speed-mul10" title="Speed × 10">×10</button>
      </div>
    </div>

    <div id="workspace">
      <div id="palette-panel">
        <div class="panel-header">Components</div>
        <div id="palette-content"></div>
      </div>
      <div id="canvas-container">
        <canvas id="sim-canvas"></canvas>
      </div>
      <div id="property-panel">
        <div class="panel-header">Properties</div>
        <div id="property-content"></div>
      </div>
    </div>
  </div>
  <input id="file-input" type="file" accept=".dig,.digb,.json,.digj" style="display:none" />
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Menu bar dropdown logic — pure JS, no framework dependency.
    // Runs before module scripts to avoid FOUC on first click.
    (function () {
      const menuBar = document.getElementById('menu-bar');
      const menuItems = menuBar ? menuBar.querySelectorAll('.menu-item') : [];

      function closeAll() {
        menuItems.forEach(function (m) { m.classList.remove('open'); });
      }

      menuItems.forEach(function (item) {
        const label = item.querySelector('.menu-label');
        if (!label) return;
        label.addEventListener('click', function (e) {
          e.stopPropagation();
          const wasOpen = item.classList.contains('open');
          closeAll();
          if (!wasOpen) {
            item.classList.add('open');
          }
        });
        // If one menu is open and you hover another, switch to it
        label.addEventListener('mouseenter', function () {
          const anyOpen = Array.from(menuItems).some(function (m) {
            return m.classList.contains('open');
          });
          if (anyOpen) {
            closeAll();
            item.classList.add('open');
          }
        });
      });

      // Close dropdowns when clicking outside the menu bar
      document.addEventListener('click', function () {
        closeAll();
      });

      // Prevent clicks inside a dropdown from closing it
      document.querySelectorAll('.menu-dropdown').forEach(function (dd) {
        dd.addEventListener('click', function (e) {
          e.stopPropagation();
          closeAll();
        });
      });
    })();
  </script>
</body>
</html>
