<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Simulator</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --fg: #d4d4d4;
      --panel-bg: #252526;
      --panel-border: #3c3c3c;
      --toolbar-bg: #333333;
      --toolbar-border: #444444;
      --accent: #569cd6;
      --wire-low: #4a9e4a;
      --wire-high: #e8e84a;
      --wire-float: #888888;
      --wire-error: #e84a4a;
      --canvas-bg: #1e1e1e;
      --grid-color: #2d2d2d;
    }
    html.light {
      --bg: #f5f5f5;
      --fg: #1e1e1e;
      --panel-bg: #ffffff;
      --panel-border: #cccccc;
      --toolbar-bg: #e8e8e8;
      --toolbar-border: #cccccc;
      --accent: #0066cc;
      --wire-low: #228b22;
      --wire-high: #cc9900;
      --wire-float: #999999;
      --wire-error: #cc0000;
      --canvas-bg: #ffffff;
      --grid-color: #e0e0e0;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-border);
      flex-shrink: 0;
      height: 36px;
    }
    #toolbar button {
      padding: 3px 8px;
      background: transparent;
      border: 1px solid var(--toolbar-border);
      color: var(--fg);
      cursor: pointer;
      border-radius: 3px;
      font-size: 12px;
    }
    #toolbar button:hover {
      background: var(--panel-border);
    }
    #toolbar .separator {
      width: 1px;
      height: 20px;
      background: var(--toolbar-border);
      margin: 0 4px;
    }
    #toolbar .speed-control {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
    }
    #toolbar .speed-control input {
      width: 60px;
      padding: 2px 4px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--fg);
      border-radius: 3px;
      font-size: 12px;
      text-align: center;
    }
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #palette-panel {
      width: 180px;
      background: var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    #palette-panel .panel-header {
      padding: 6px 8px;
      font-weight: 600;
      border-bottom: 1px solid var(--panel-border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg);
      opacity: 0.7;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #sim-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: var(--canvas-bg);
      cursor: default;
    }
    #property-panel {
      width: 200px;
      background: var(--panel-bg);
      border-left: 1px solid var(--panel-border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    #property-panel .panel-header {
      padding: 6px 8px;
      font-weight: 600;
      border-bottom: 1px solid var(--panel-border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--fg);
      opacity: 0.7;
    }
    .panels-none #palette-panel,
    .panels-none #property-panel {
      display: none;
    }
    /* Palette styles */
    .palette-search {
      padding: 4px 6px;
      border-bottom: 1px solid var(--panel-border);
    }
    .palette-search-input {
      width: 100%;
      padding: 3px 6px;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      color: var(--fg);
      border-radius: 3px;
      font-size: 12px;
    }
    .palette-category-header {
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--fg);
      opacity: 0.8;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
    }
    .palette-category-header:hover {
      background: var(--toolbar-bg);
    }
    .palette-component-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .palette-component-item {
      padding: 3px 12px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .palette-component-item:hover {
      background: var(--accent);
      color: #fff;
    }
    /* Property panel styles */
    .prop-row {
      display: flex;
      flex-direction: column;
      padding: 4px 8px;
      border-bottom: 1px solid var(--panel-border);
    }
    .prop-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--fg);
      opacity: 0.7;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .prop-row input, .prop-row select {
      width: 100%;
      padding: 2px 4px;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      color: var(--fg);
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="btn-step" title="Step (single propagation cycle)">Step</button>
      <button id="btn-run" title="Run / Pause simulation">Run</button>
      <button id="btn-stop" title="Stop and reset simulation">Stop</button>
      <div class="separator"></div>
      <button id="btn-open" title="Open circuit file">Open</button>
      <button id="btn-save" title="Save circuit">Save</button>
      <div class="speed-control">
        <button id="btn-speed-div10" title="Speed ÷ 10">/10</button>
        <button id="btn-speed-div2" title="Speed ÷ 2">/2</button>
        <input id="speed-input" type="text" value="1000" title="Steps per second" />
        <button id="btn-speed-mul2" title="Speed × 2">×2</button>
        <button id="btn-speed-mul10" title="Speed × 10">×10</button>
      </div>
    </div>
    <div id="workspace">
      <div id="palette-panel">
        <div class="panel-header">Components</div>
        <div id="palette-content"></div>
      </div>
      <div id="canvas-container">
        <canvas id="sim-canvas"></canvas>
      </div>
      <div id="property-panel">
        <div class="panel-header">Properties</div>
        <div id="property-content"></div>
      </div>
    </div>
  </div>
  <input id="file-input" type="file" accept=".dig,.digb" style="display:none" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
