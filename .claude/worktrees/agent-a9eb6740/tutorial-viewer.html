<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorial Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #e0e0e0; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ---- Top bar ---- */
    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: #2a2a2a; border-bottom: 1px solid #3a3a3a;
    }
    .top-bar h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .step-nav { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
    .step-btn {
      padding: 6px 14px; background: #3a3a3a; color: #ccc; border: 1px solid #4a4a4a;
      border-radius: 4px; cursor: pointer; white-space: nowrap; font-size: 12px;
    }
    .step-btn:hover { background: #4a4a4a; }
    .step-btn.active { background: #0066cc; border-color: #0066cc; color: #fff; }
    .step-btn.completed { border-color: #4a4; }
    .step-btn.completed::after { content: " \2713"; color: #4a4; }

    /* ---- Main content ---- */
    .content { display: flex; flex: 1; min-height: 0; }

    /* ---- Instructions panel ---- */
    .instructions {
      width: 360px; flex-shrink: 0; background: #252525; border-right: 1px solid #3a3a3a;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .instructions-body { flex: 1; overflow-y: auto; padding: 16px; line-height: 1.6; font-size: 13px; }
    .instructions-body h1 { font-size: 18px; margin: 0 0 12px; color: #fff; }
    .instructions-body h2 { font-size: 15px; margin: 16px 0 8px; color: #fff; }
    .instructions-body h3 { font-size: 13px; margin: 12px 0 6px; color: #ddd; }
    .instructions-body p { margin: 8px 0; }
    .instructions-body strong { color: #fff; }
    .instructions-body code { background: #1a1a1a; padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #a0e0a0; }
    .instructions-body pre { background: #1a1a1a; padding: 10px; border-radius: 4px; overflow-x: auto; margin: 8px 0; border-left: 3px solid #0066cc; }
    .instructions-body pre code { background: none; padding: 0; }
    .instructions-body ul, .instructions-body ol { margin: 8px 0 8px 20px; }
    .instructions-body li { margin: 4px 0; }

    /* ---- Hints ---- */
    .hints-section { border-top: 1px solid #3a3a3a; padding: 8px 16px; }
    .hint-btn {
      display: block; width: 100%; padding: 6px 10px; margin: 4px 0;
      background: #333; color: #aaa; border: 1px solid #444; border-radius: 4px;
      cursor: pointer; font-size: 12px; text-align: left;
    }
    .hint-btn:hover { background: #3a3a3a; color: #ccc; }
    .hint-btn.revealed { background: transparent; border-color: transparent; color: #e0e0e0; cursor: default; padding: 6px 0; }
    .hint-content { display: none; padding: 6px 0; font-size: 12px; line-height: 1.5; color: #ccc; }
    .hint-content.visible { display: block; }

    /* ---- Actions bar ---- */
    .actions-bar {
      display: flex; gap: 8px; padding: 8px 16px;
      border-top: 1px solid #3a3a3a; background: #2a2a2a;
    }
    .test-btn {
      flex: 1; padding: 8px; background: #0066cc; color: #fff; border: none;
      border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .test-btn:hover { background: #0077dd; }
    .test-btn:disabled { background: #555; cursor: default; }
    .precheck-btn {
      padding: 8px 12px; background: #3a5a3a; color: #aca; border: 1px solid #4a6a4a;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .precheck-btn:hover { background: #4a6a4a; color: #cec; }
    .precheck-btn:disabled { opacity: 0.4; cursor: default; }
    .solution-btn {
      padding: 8px 12px; background: #444; color: #aaa; border: 1px solid #555;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .solution-btn:hover { background: #555; color: #ccc; }
    .solution-btn:disabled { opacity: 0.4; cursor: default; }
    .solution-btn.loaded { border-color: #668; color: #99b; }
    .nav-btn {
      padding: 8px 16px; background: #3a3a3a; color: #ccc; border: 1px solid #4a4a4a;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .nav-btn:hover { background: #4a4a4a; }
    .nav-btn:disabled { opacity: 0.4; cursor: default; }

    /* ---- Test results ---- */
    .test-result {
      padding: 8px 16px; font-size: 12px; font-weight: 600;
      border-top: 1px solid #3a3a3a; display: none;
    }
    .test-result.pass { display: block; background: #1a3a1a; color: #4c4; }
    .test-result.fail { display: block; background: #3a1a1a; color: #c44; }

    /* ---- Simulator ---- */
    .simulator-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .simulator-iframe { flex: 1; border: none; background: #1a1a1a; }

    /* ---- Loading ---- */
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; }

    @media (max-width: 900px) {
      .content { flex-direction: column; }
      .instructions { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid #3a3a3a; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <h1 id="tutorial-title">Loading...</h1>
      <div class="step-nav" id="step-nav"></div>
    </div>
    <div class="content">
      <div class="instructions">
        <div class="instructions-body" id="instructions"></div>
        <div class="hints-section" id="hints"></div>
        <div class="test-result" id="test-result"></div>
        <div class="actions-bar">
          <button class="nav-btn" id="btn-prev" disabled>&larr; Prev</button>
          <button class="precheck-btn" id="btn-precheck" style="display:none">Pre-check</button>
          <button class="test-btn" id="btn-test" disabled>Check Circuit</button>
          <button class="solution-btn" id="btn-solution" disabled>Show Solution</button>
          <button class="nav-btn" id="btn-next" disabled>Next &rarr;</button>
        </div>
      </div>
      <div class="simulator-pane">
        <iframe id="simulator" class="simulator-iframe" src="simulator.html"></iframe>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let manifest = null;
    let currentStepIndex = 0;
    let simulatorReady = false;
    let completedSteps = new Set();
    const iframe = document.getElementById('simulator');

    // --- Parse URL params ---
    const params = new URLSearchParams(window.location.search);
    const manifestUrl = params.get('manifest') || 'tutorials/sr-to-flipflop/manifest.json';

    // --- Load manifest ---
    async function init() {
      try {
        const res = await fetch(manifestUrl);
        if (!res.ok) throw new Error(`Failed to load manifest: ${res.statusText}`);
        manifest = await res.json();
        document.getElementById('tutorial-title').textContent = manifest.title;
        document.title = manifest.title;
        buildStepNav();
        loadStep(0);
      } catch (err) {
        document.getElementById('instructions').innerHTML =
          `<p style="color:#c44">Error: ${err.message}</p><p>Make sure you're serving over HTTP, not file://</p>`;
      }
    }

    // --- Step navigation ---
    function buildStepNav() {
      const nav = document.getElementById('step-nav');
      nav.innerHTML = '';
      manifest.steps.forEach((step, i) => {
        const btn = document.createElement('button');
        btn.className = 'step-btn';
        btn.textContent = `${i + 1}. ${step.title}`;
        btn.onclick = () => loadStep(i);
        btn.dataset.index = i;
        nav.appendChild(btn);
      });
    }

    function updateStepNav() {
      document.querySelectorAll('.step-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === currentStepIndex);
        btn.classList.toggle('completed', completedSteps.has(i));
      });
    }

    // --- Render markdown (simple) ---
    function renderMarkdown(md) {
      const escaped = md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return escaped
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+?)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
        .replace(/<\/ul>\s*<ul>/g, '')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/^(?!<[huploe])/gm, function(m) { return m ? '<p>' + m : m; });
    }

    // --- Load a step ---
    function loadStep(index) {
      const step = manifest.steps[index];
      if (!step) return;
      currentStepIndex = index;
      updateStepNav();

      // Render instructions
      document.getElementById('instructions').innerHTML = renderMarkdown(step.instructions);

      // Render hints
      const hintsEl = document.getElementById('hints');
      hintsEl.innerHTML = '';
      if (step.hints && step.hints.length > 0) {
        let hintsRevealed = 0;
        step.hints.forEach((hint, i) => {
          const wrapper = document.createElement('div');
          const btn = document.createElement('button');
          btn.className = 'hint-btn';
          btn.textContent = hint.label;
          const content = document.createElement('div');
          content.className = 'hint-content';
          content.innerHTML = renderMarkdown(hint.content);
          btn.onclick = () => {
            if (i <= hintsRevealed) {
              btn.classList.add('revealed');
              content.classList.add('visible');
              hintsRevealed = Math.max(hintsRevealed, i + 1);
              // Highlight if hint has highlight labels
              if (hint.highlight && simulatorReady) {
                sendToSimulator({ type: 'digital-highlight', labels: hint.highlight, duration: 5000 });
              }
            }
          };
          // Only enable the next unrevealed hint
          if (i > 0) btn.style.opacity = '0.5';
          wrapper.appendChild(btn);
          wrapper.appendChild(content);
          hintsEl.appendChild(wrapper);

          // Update opacity as hints are revealed
          const updateOpacity = () => {
            hintsEl.querySelectorAll('.hint-btn').forEach((b, j) => {
              b.style.opacity = j <= hintsRevealed ? '1' : '0.5';
              if (j > hintsRevealed) b.onclick = null;
              else b.onclick = () => {
                b.classList.add('revealed');
                b.nextElementSibling.classList.add('visible');
                hintsRevealed = Math.max(hintsRevealed, j + 1);
                updateOpacity();
              };
            });
          };
          // Override onclick with opacity-aware version
          btn.onclick = () => {
            if (i <= hintsRevealed) {
              btn.classList.add('revealed');
              content.classList.add('visible');
              hintsRevealed = Math.max(hintsRevealed, i + 1);
              updateOpacity();
              if (hint.highlight && simulatorReady) {
                sendToSimulator({ type: 'digital-highlight', labels: hint.highlight, duration: 5000 });
              }
            }
          };
        });
      }

      // Reset test results
      const resultEl = document.getElementById('test-result');
      resultEl.className = 'test-result';
      resultEl.textContent = '';

      // Determine step mode: "guided" (default) or "explore"
      const mode = step.mode || 'guided';
      const hasTests = step.validation === 'test-vectors' || (!step.validation && step.testData);
      const hasGoal = !!(step.goalCircuitFile || step.goalCircuit);
      const isLast = index >= manifest.steps.length - 1;
      const isFirst = index <= 0;

      const btnTest = document.getElementById('btn-test');
      const btnSolution = document.getElementById('btn-solution');
      const btnNext = document.getElementById('btn-next');
      const btnPrev = document.getElementById('btn-prev');
      const btnPrecheck = document.getElementById('btn-precheck');

      btnPrev.disabled = isFirst;

      if (mode === 'explore') {
        // Explore: Show Solution visible, Next always enabled, Check optional
        btnTest.disabled = !hasTests;
        btnTest.style.display = hasTests ? '' : 'none';
        btnSolution.disabled = !hasGoal;
        btnSolution.style.display = '';
        btnSolution.classList.remove('loaded');
        btnSolution.textContent = 'Show Solution';
        btnNext.disabled = isLast;
        btnPrecheck.style.display = 'none';
      } else {
        // Guided: No Show Solution, Next gated until completed, Pre-check visible
        btnTest.disabled = !hasTests;
        btnTest.style.display = '';
        btnSolution.style.display = 'none';
        btnNext.disabled = isLast || (!completedSteps.has(index));
        btnPrecheck.style.display = '';
        btnPrecheck.disabled = false;
      }

      // Send to simulator when ready
      if (simulatorReady) {
        applyStepToSimulator(step);
      } else {
        pendingStep = step;
      }
    }

    let pendingStep = null;

    function applyStepToSimulator(step) {
      // Set palette
      const palette = resolvePalette(step.palette);
      sendToSimulator({ type: 'digital-set-palette', components: palette });

      // Set locked components
      sendToSimulator({
        type: 'digital-set-readonly-components',
        labels: step.lockedComponents || null
      });

      // Load start circuit
      const base = manifestUrl.substring(0, manifestUrl.lastIndexOf('/') + 1);
      if (step.startCircuit === null || step.startCircuit === undefined) {
        const emptyDig = '<?xml version="1.0" encoding="utf-8"?><circuit></circuit>';
        sendToSimulator({ type: 'digital-load-data', data: btoa(emptyDig) });
      } else if (step.startCircuit === 'carry-forward') {
        // If the previous step was completed by the student, their circuit is
        // already on the canvas. Otherwise load the previous step's goal
        // circuit so navigation still works for readers skipping ahead.
        const prevIndex = currentStepIndex - 1;
        if (prevIndex >= 0 && !completedSteps.has(prevIndex)) {
          const prevStep = manifest.steps[prevIndex];
          const prevGoalFile = prevStep.goalCircuitFile || (typeof prevStep.goalCircuit === 'string' ? prevStep.goalCircuit : null);
          if (prevGoalFile) {
            sendToSimulator({ type: 'digital-load-url', url: base + prevGoalFile });
          }
        }
        // else: student completed the previous step, keep their circuit
      } else if (typeof step.startCircuit === 'string') {
        sendToSimulator({ type: 'digital-load-url', url: base + step.startCircuit });
      }

      // Highlight if step has initial highlights
      if (step.highlight && step.highlight.length > 0) {
        setTimeout(() => {
          sendToSimulator({ type: 'digital-highlight', labels: step.highlight, duration: 5000 });
        }, 500);
      }
    }

    function resolvePalette(spec) {
      if (spec === null || spec === undefined) return null;
      if (Array.isArray(spec)) return spec;
      if (typeof spec === 'string') {
        // Named preset — presets are resolved server-side in tutorial_create,
        // but for the viewer we need to handle them. Embed the common ones.
        const presets = {
          'basic-gates': ['And', 'Or', 'Not', 'In', 'Out'],
          'nand-only': ['NAnd', 'In', 'Out'],
          'nor-only': ['NOr', 'In', 'Out'],
          'gates-and-io': ['And', 'Or', 'Not', 'NAnd', 'NOr', 'XOr', 'XNOr', 'In', 'Out', 'Const', 'Led', 'Probe'],
          'sequential-intro': ['NAnd', 'NOr', 'And', 'Or', 'Not', 'In', 'Out', 'Clock', 'Led', 'Probe'],
        };
        return presets[spec] || null;
      }
      if (typeof spec === 'object' && spec.preset) {
        const presets = {
          'basic-gates': ['And', 'Or', 'Not', 'In', 'Out'],
          'nand-only': ['NAnd', 'In', 'Out'],
          'nor-only': ['NOr', 'In', 'Out'],
        };
        const base = presets[spec.preset] ? [...presets[spec.preset]] : [];
        if (spec.add) base.push(...spec.add);
        if (spec.remove) {
          const removeSet = new Set(spec.remove);
          return base.filter(n => !removeSet.has(n));
        }
        return base;
      }
      return null;
    }

    // --- Simulator communication ---
    function sendToSimulator(msg) {
      iframe.contentWindow.postMessage(msg, '*');
    }

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;

      switch (data.type) {
        case 'digital-ready':
          simulatorReady = true;
          if (pendingStep) {
            applyStepToSimulator(pendingStep);
            pendingStep = null;
          }
          break;

        case 'digital-test-result': {
          const resultEl = document.getElementById('test-result');
          if (data.failed === 0) {
            resultEl.className = 'test-result pass';
            resultEl.textContent = `All ${data.total} tests passed!`;
            completedSteps.add(currentStepIndex);
            updateStepNav();
            // Ungate Next in guided mode
            const nextBtn = document.getElementById('btn-next');
            if (currentStepIndex < manifest.steps.length - 1) {
              nextBtn.disabled = false;
            }
          } else {
            resultEl.className = 'test-result fail';
            resultEl.textContent = `${data.failed} of ${data.total} tests failed.`;
            // Show first failure detail
            const firstFail = data.details.find(d => !d.passed);
            if (firstFail) {
              const inputs = Object.entries(firstFail.inputs).map(([k,v]) => `${k}=${v}`).join(', ');
              const expected = Object.entries(firstFail.expected).map(([k,v]) => `${k}=${v}`).join(', ');
              const actual = Object.entries(firstFail.actual).map(([k,v]) => `${k}=${v}`).join(', ');
              resultEl.textContent += ` First: inputs(${inputs}) expected(${expected}) got(${actual})`;
            }
          }
          break;
        }

        case 'digital-error':
          const resultEl = document.getElementById('test-result');
          resultEl.className = 'test-result fail';
          resultEl.textContent = `Error: ${data.error}`;
          break;
      }
    });

    // --- Button handlers ---
    document.getElementById('btn-test').onclick = () => {
      const step = manifest.steps[currentStepIndex];
      if (step && step.testData) {
        document.getElementById('test-result').className = 'test-result';
        document.getElementById('test-result').textContent = '';
        sendToSimulator({ type: 'digital-test', testData: step.testData });
      }
    };

    document.getElementById('btn-prev').onclick = () => {
      if (currentStepIndex > 0) {
        loadStep(currentStepIndex - 1);
      }
    };

    document.getElementById('btn-next').onclick = () => {
      if (currentStepIndex < manifest.steps.length - 1) {
        loadStep(currentStepIndex + 1);
      }
    };

    document.getElementById('btn-precheck').onclick = () => {
      const step = manifest.steps[currentStepIndex];
      if (!step || !step.testData) return;
      // Extract expected signal names from test data header
      const hdrLine = step.testData.split('\n').find(l => l.trim().length > 0 && !l.trim().startsWith('#')) || '';
      const expectedLabels = hdrLine.trim().split(/\s+/).filter(n => n.length > 0);
      if (expectedLabels.length === 0) return;
      // Ask the simulator for the circuit, then we check labels via a compile attempt
      // Use digital-test with a single trivial row — if labels are missing, the error
      // message will tell the student which ones. We send just the header + one X row.
      const precheckData = expectedLabels.join(' ') + '\n' + expectedLabels.map(() => 'X').join(' ');
      document.getElementById('test-result').className = 'test-result';
      document.getElementById('test-result').textContent = '';
      sendToSimulator({ type: 'digital-test', testData: precheckData });
    };

    document.getElementById('btn-solution').onclick = () => {
      const step = manifest.steps[currentStepIndex];
      if (!step) return;
      const goalFile = step.goalCircuitFile || (typeof step.goalCircuit === 'string' ? step.goalCircuit : null);
      if (goalFile) {
        const base = manifestUrl.substring(0, manifestUrl.lastIndexOf('/') + 1);
        sendToSimulator({ type: 'digital-load-url', url: base + goalFile });
        const btn = document.getElementById('btn-solution');
        btn.textContent = 'Solution loaded';
        btn.classList.add('loaded');
      }
    };

    // --- Start ---
    init();
  </script>
</body>
</html>
