<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Tutorial</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: #1e1e1e;
        color: #e0e0e0;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .checkpoint-nav {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        background: #2a2a2a;
        border-bottom: 1px solid #3a3a3a;
        overflow-x: auto;
      }

      .checkpoint-nav-button {
        padding: 8px 16px;
        background: #3a3a3a;
        color: #e0e0e0;
        border: 1px solid #4a4a4a;
        border-radius: 4px;
        cursor: pointer;
        white-space: nowrap;
        transition: background-color 0.2s;
      }

      .checkpoint-nav-button:hover {
        background: #4a4a4a;
      }

      .checkpoint-nav-button.active {
        background: #0066cc;
        border-color: #0066cc;
      }

      .content-pane {
        display: flex;
        flex: 1;
        gap: 16px;
        padding: 16px;
        min-height: 0;
      }

      .instructions {
        flex: 0 0 40%;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        padding: 16px;
        overflow-y: auto;
      }

      .instructions h1 {
        font-size: 1.8em;
        margin-bottom: 12px;
        color: #ffffff;
      }

      .instructions h2 {
        font-size: 1.4em;
        margin-top: 16px;
        margin-bottom: 8px;
        color: #ffffff;
      }

      .instructions h3 {
        font-size: 1.1em;
        margin-top: 12px;
        margin-bottom: 6px;
        color: #d0d0d0;
      }

      .instructions p {
        margin-bottom: 12px;
        line-height: 1.5;
      }

      .instructions code {
        background: #1a1a1a;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 0.9em;
        color: #a0e0a0;
      }

      .instructions pre {
        background: #1a1a1a;
        padding: 12px;
        border-radius: 4px;
        overflow-x: auto;
        margin-bottom: 12px;
        border-left: 3px solid #0066cc;
      }

      .instructions pre code {
        background: none;
        padding: 0;
        color: #a0e0a0;
      }

      .instructions strong {
        color: #ffffff;
      }

      .instructions a {
        color: #66b3ff;
        text-decoration: none;
      }

      .instructions a:hover {
        text-decoration: underline;
      }

      .instructions ul {
        margin-left: 24px;
        margin-bottom: 12px;
      }

      .instructions li {
        margin-bottom: 6px;
        line-height: 1.5;
      }

      .simulator-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        overflow: hidden;
      }

      .simulator-iframe {
        flex: 1;
        border: none;
        background: #1a1a1a;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #888;
      }

      @media (max-width: 1200px) {
        .content-pane {
          flex-direction: column;
        }

        .instructions {
          flex: 0 0 auto;
          max-height: 40vh;
        }

        .simulator-pane {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="checkpoint-nav" id="checkpoint-nav"></div>
      <div class="content-pane">
        <div class="instructions" id="instructions"></div>
        <div class="simulator-pane">
          <iframe
            id="simulator"
            class="simulator-iframe"
            src="simulator.html"
          ></iframe>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        TutorialHost,
        parseUrlParams,
        setupCheckpointNavigation,
      } from './dist/tutorial.js';

      // Parse URL parameters
      const params = parseUrlParams(new URLSearchParams(window.location.search));
      const tutorial = params.tutorial || 'intro-to-logic';
      const step = params.step || 1;
      const maxSteps = 3; // Adjust based on your tutorial structure

      // Initialize tutorial host
      const host = new TutorialHost('instructions');

      // Register the simulator iframe
      const simulatorIframe = document.getElementById('simulator');
      if (simulatorIframe instanceof HTMLIFrameElement) {
        host.registerIframe(simulatorIframe);
      }

      // Set up checkpoint navigation
      setupCheckpointNavigation(
        tutorial,
        maxSteps,
        (t, s) => host.navigateToCheckpoint(t, s),
        'checkpoint-nav'
      );

      // Initialize with current checkpoint
      host.init(tutorial, step);
    </script>
  </body>
</html>
