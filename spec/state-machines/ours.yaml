# ============================================================================
# Parameters
# ============================================================================

parameters:
  - name: "reltol"
    value: 1.0e-3
    unit: ""
    role: "Relative convergence tolerance for NR node-voltage check and LTE"
    mapping: { ours: "SimulationParams.reltol" }

  - name: "abstol"
    value: 1.0e-6
    unit: "V"
    role: "Absolute voltage tolerance (ngspice VNTOL) for NR convergence"
    mapping: { ours: "SimulationParams.abstol" }

  - name: "iabstol"
    value: 1.0e-12
    unit: "A"
    role: "Absolute current tolerance (ngspice ABSTOL) for device convergence and branch rows"
    mapping: { ours: "SimulationParams.iabstol" }

  - name: "chargeTol"
    value: 1.0e-14
    unit: "C"
    role: "Absolute charge tolerance for LTE control (ngspice CHGTOL)"
    mapping: { ours: "SimulationParams.chargeTol" }

  - name: "trtol"
    value: 7.0
    unit: ""
    role: "Truncation error tolerance multiplier (ngspice trtol)"
    mapping: { ours: "SimulationParams.trtol" }

  - name: "maxIterations"
    value: 100
    unit: ""
    role: "Max NR iterations for DCOP direct solve (ngspice ITL1, floored to 100)"
    mapping: { ours: "SimulationParams.maxIterations" }

  - name: "transientMaxIterations"
    value: 10
    unit: ""
    role: "Max NR iterations per transient timestep (ngspice ITL4)"
    mapping: { ours: "SimulationParams.transientMaxIterations" }

  - name: "dcTrcvMaxIter"
    value: 50
    unit: ""
    role: "Max NR iterations per gmin/source stepping sub-solve (ngspice ITL3)"
    mapping: { ours: "SimulationParams.dcTrcvMaxIter" }

  - name: "maxTimeStep"
    value: 10.0e-6
    unit: "s"
    role: "Upper bound on transient timestep"
    mapping: { ours: "SimulationParams.maxTimeStep" }

  - name: "minTimeStep"
    value: 1.0e-15
    unit: "s"
    role: "Lower bound on transient timestep (ngspice delmin)"
    mapping: { ours: "SimulationParams.minTimeStep" }

  - name: "firstStep"
    value: 1.0e-9
    unit: "s"
    role: "Initial timestep for first transient step"
    mapping: { ours: "SimulationParams.firstStep" }

  - name: "gmin"
    value: 1.0e-12
    unit: "S"
    role: "Minimum conductance for numerical stability (ngspice CKTgmin)"
    mapping: { ours: "SimulationParams.gmin" }

  - name: "gshunt"
    value: 0
    unit: "S"
    role: "Shunt conductance applied to all nodes (ngspice CKTgshunt)"
    mapping: { ours: "SimulationParams.gshunt" }

  - name: "nodeDamping"
    value: false
    unit: ""
    role: "Enable node damping in NR iteration (ngspice niiter.c)"
    mapping: { ours: "SimulationParams.nodeDamping" }

  - name: "numGminSteps"
    value: 1
    unit: ""
    role: "Gmin stepping levels. 1=dynamic, >1=spice3 (ngspice CKTnumGminSteps)"
    mapping: { ours: "SimulationParams.numGminSteps" }

  - name: "numSrcSteps"
    value: 1
    unit: ""
    role: "Source stepping levels. <=1=gillespie, >1=spice3 (ngspice CKTnumSrcSteps)"
    mapping: { ours: "SimulationParams.numSrcSteps" }

  - name: "predictor"
    value: false
    unit: ""
    role: "Enable voltage predictor (ngspice PREDICTOR ifdef)"
    mapping: { ours: "SimulationParams.predictor" }

  - name: "uic"
    value: false
    unit: ""
    role: "Use Initial Conditions mode (ngspice MODEUIC)"
    mapping: { ours: "SimulationParams.uic" }

  - name: "PIVOT_THRESHOLD"
    value: 1.0e-3
    unit: ""
    role: "Partial pivoting threshold for sparse LU (ngspice DEFAULT_THRESHOLD)"
    mapping: { ours: "sparse-solver.ts PIVOT_THRESHOLD" }

  - name: "PIVOT_ABS_THRESHOLD"
    value: 1.0e-13
    unit: ""
    role: "Absolute pivot threshold (ngspice CKTpivotAbsTol)"
    mapping: { ours: "sparse-solver.ts PIVOT_ABS_THRESHOLD" }

# ============================================================================
# States - exhaustive action-level inventory
# ============================================================================

states:
  # ==========================================================================
  # PHASE 0: Engine Initialization
  # ==========================================================================

  - id: "engine_init"
    implemented: true
    attributes: ["lifecycle"]
    edges_in:
      - from: "START"
        condition: "MNAEngine.init(circuit) called"
        label: "init"
    edges_out:
      - to: "allocate_solver_infrastructure"
        condition: "always"
        label: "begin allocation"
    notes: "MNAEngine.init() entry point. Narrows CompiledCircuit to ConcreteCompiledAnalogCircuit. Validates pool-backed elements have stateBaseOffset assigned by compiler. Method: MNAEngine.init() (analog-engine.ts:146-199)."

  - id: "allocate_solver_infrastructure"
    implemented: true
    attributes: ["lifecycle"]
    edges_in:
      - from: "engine_init"
        condition: "always"
        label: "allocation"
    edges_out:
      - to: "seed_breakpoints"
        condition: "always"
        label: "allocation complete"
    notes: "Allocates Float64Array buffers for _voltages, _prevVoltages, _nrVoltages, _nrPrevVoltages (all sized to matrixSize). Creates SparseSolver, TimestepController, HistoryStore, NodeVoltageHistory, DiagnosticCollector. Clears convergence log. Resets simTime=0. Method: MNAEngine.init() (analog-engine.ts:153-169)."

  - id: "seed_breakpoints"
    implemented: true
    attributes: ["lifecycle"]
    edges_in:
      - from: "allocate_solver_infrastructure"
        condition: "always"
        label: "post-allocation"
      - from: "engine_reset"
        condition: "always"
        label: "post-reset"
      - from: "engine_configure"
        condition: "always"
        label: "post-configure"
    edges_out:
      - to: "engine_ready"
        condition: "always"
        label: "breakpoints seeded"
    notes: "Iterates all elements calling el.nextBreakpoint(simTime) to populate the TimestepController breakpoint queue. Registers refresh callbacks for elements with registerRefreshCallback. Method: MNAEngine._seedBreakpoints() (analog-engine.ts:1088-1100)."

  - id: "engine_ready"
    implemented: true
    attributes: ["lifecycle"]
    edges_in:
      - from: "seed_breakpoints"
        condition: "always"
        label: "ready"
      - from: "dcop_return_success"
        condition: "always"
        label: "DCOP complete"
      - from: "dcop_return_failure"
        condition: "always"
        label: "DCOP failed"
      - from: "transient_step_complete"
        condition: "always"
        label: "step complete"
    edges_out:
      - to: "dcop_begin"
        condition: "dcOperatingPoint() called"
        label: "begin DCOP"
      - to: "transient_step_entry"
        condition: "step() called"
        label: "begin step"
      - to: "engine_reset"
        condition: "reset() called"
        label: "reset"
      - to: "engine_configure"
        condition: "configure() called"
        label: "configure"
    notes: "Engine is in STOPPED state, ready for simulation. Transitions to RUNNING on start(). State: EngineState.STOPPED."

  - id: "engine_reset"
    implemented: true
    attributes: ["lifecycle"]
    edges_in:
      - from: "engine_ready"
        condition: "reset() called"
        label: "reset"
    edges_out:
      - to: "seed_breakpoints"
        condition: "always"
        label: "post-reset"
    notes: "Zeros voltages, prevVoltages, history, simTime. Resets statePool (zeros all state arrays, sets initMode=transient, analysisMode=dcOp). Calls el.initState(pool) for pool-backed elements. Rebuilds TimestepController. Method: MNAEngine.reset() (analog-engine.ts:203-229)."

  - id: "engine_configure"
    implemented: true
    attributes: ["lifecycle"]
    edges_in:
      - from: "engine_ready"
        condition: "configure(params) called"
        label: "configure"
    edges_out:
      - to: "seed_breakpoints"
        condition: "always"
        label: "reconfigure"
    notes: "Merges partial SimulationParams, resolves defaults, rebuilds TimestepController. Method: MNAEngine.configure() (analog-engine.ts:977-981)."

  # ==========================================================================
  # PHASE 1: DC Operating Point - Top-Level
  # ==========================================================================

  - id: "dcop_begin"
    implemented: true
    attributes: ["dcop"]
    edges_in:
      - from: "engine_ready"
        condition: "dcOperatingPoint() called"
        label: "DCOP entry"
    edges_out:
      - to: "dcop_reset_state_pool"
        condition: "always"
        label: "begin DCOP"
    notes: "Entry point for DC operating point analysis. Clears diagnostics. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:731-843)."

  - id: "dcop_reset_state_pool"
    implemented: true
    attributes: ["dcop", "state-vector"]
    edges_in:
      - from: "dcop_begin"
        condition: "always"
        label: "reset pool"
    edges_out:
      - to: "dcop_init_element_state"
        condition: "statePool exists"
        label: "pool reset"
      - to: "dcop_direct_nr"
        condition: "no statePool"
        label: "skip pool init"
    notes: "Calls statePool.reset(): zeros all 4 state arrays, sets tranStep=0, initMode=transient, analysisMode=dcOp, dt=0. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:746-753)."

  - id: "dcop_init_element_state"
    implemented: true
    attributes: ["dcop", "state-vector"]
    edges_in:
      - from: "dcop_reset_state_pool"
        condition: "statePool exists"
        label: "init elements"
    edges_out:
      - to: "dcop_direct_nr"
        condition: "always"
        label: "elements initialized"
    notes: "Calls el.initState(statePool) for each pool-backed element. Applies initial values from StateSchema slot descriptors into pool.state0. Temperature-dependent parameters computed here (pool.temperature=300.15K default). Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:748-753)."

  - id: "dcop_direct_nr"
    implemented: true
    attributes: ["dcop", "level-0"]
    edges_in:
      - from: "dcop_init_element_state"
        condition: "always"
        label: "start direct NR"
      - from: "dcop_reset_state_pool"
        condition: "no statePool"
        label: "start direct NR"
    edges_out:
      - to: "dcop_prime_junctions"
        condition: "always (ladder always constructed)"
        label: "begin mode ladder"
    notes: "Enters solveDcOperatingPoint(). Constructs dcopModeLadder (always non-null). Sets pool.initMode=initJct. Emits onPhaseBegin(dcopInitJct). Method: solveDcOperatingPoint() (dc-operating-point.ts:196-274)."

  - id: "dcop_prime_junctions"
    implemented: true
    attributes: ["dcop", "level-0", "initJct"]
    edges_in:
      - from: "dcop_direct_nr"
        condition: "always"
        label: "prime junctions"
    edges_out:
      - to: "nr_initialize_operating_points"
        condition: "always"
        label: "enter NR setup"
    notes: "ladder.runPrimeJunctions() calls el.primeJunctions() for each nonlinear element. Arms one-shot per-device junction seeds (tVcrit-derived). Matches ngspice MODEINITJCT (bjtload.c:265-274). Then runs assembler.updateOperatingPoints() with primed state, re-stamps nonlinear. Method: newtonRaphson() (newton-raphson.ts:445-457). INITF flags: initJct active."

  # === PHASE 1b: DCOP Result Handling ===

  - id: "dcop_direct_check_converged"
    implemented: true
    attributes: ["dcop", "level-0"]
    edges_in:
      - from: "nr_return_success"
        condition: "DCOP direct NR"
        label: "check"
      - from: "nr_return_failure"
        condition: "DCOP direct NR"
        label: "check"
    edges_out:
      - to: "dcop_store_result"
        condition: "directResult.converged"
        label: "success"
      - to: "dcop_gmin_stepping"
        condition: "!directResult.converged"
        label: "gmin fallback"
    notes: "Resets pool.initMode to transient. If converged emits dc-op-converged. Method: solveDcOperatingPoint() (dc-operating-point.ts:279-305)."

  - id: "dcop_store_result"
    implemented: true
    attributes: ["dcop"]
    edges_in:
      - from: "dcop_direct_check_converged"
        condition: "converged"
        label: "store"
      - from: "dcop_gmin_final_clean_solve"
        condition: "converged"
        label: "store"
      - from: "dcop_src_final_clean_solve"
        condition: "converged"
        label: "store"
    edges_out:
      - to: "dcop_write_initial_charge"
        condition: "always"
        label: "write charge"
    notes: "Copies result.nodeVoltages into engine._voltages. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:801)."

  - id: "dcop_write_initial_charge"
    implemented: true
    attributes: ["dcop", "state-vector"]
    edges_in:
      - from: "dcop_store_result"
        condition: "always"
        label: "write charge"
    edges_out:
      - to: "dcop_seed_history"
        condition: "always"
        label: "seed"
    notes: "el.updateChargeFlux(voltages, 0, bdf1, 1, []) for each reactive element. Writes initial Q. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:810-813)."

  - id: "dcop_seed_history"
    implemented: true
    attributes: ["dcop", "state-vector"]
    edges_in:
      - from: "dcop_write_initial_charge"
        condition: "always"
        label: "seed"
    edges_out:
      - to: "dcop_set_analysis_mode_tran"
        condition: "always"
        label: "mode switch"
    notes: "statePool.seedHistory() copies state0 into state1/2/3. refreshElementRefs updates refs. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:817-818)."

  - id: "dcop_set_analysis_mode_tran"
    implemented: true
    attributes: ["dcop", "mode"]
    edges_in:
      - from: "dcop_seed_history"
        condition: "always"
        label: "tran mode"
    edges_out:
      - to: "dcop_seed_companion_state"
        condition: "always"
        label: "seed companions"
    notes: "Sets analysisMode=tran, _firsttime=true. Mirrors ngspice dctran.c:346. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:823-824)."

  - id: "dcop_seed_companion_state"
    implemented: true
    attributes: ["dcop"]
    edges_in:
      - from: "dcop_set_analysis_mode_tran"
        condition: "always"
        label: "seed"
    edges_out:
      - to: "dcop_return_success"
        condition: "always"
        label: "done"
    notes: "el.updateCompanion(0, method, voltages) seeds edge-detection from DC OP. Method: MNAEngine.dcOperatingPoint() (analog-engine.ts:834-839)."

  - id: "dcop_return_success"
    implemented: true
    attributes: ["dcop"]
    edges_in:
      - from: "dcop_seed_companion_state"
        condition: "always"
        label: "return"
    edges_out:
      - to: "engine_ready"
        condition: "always"
        label: "DCOP complete"
    notes: "Returns DcOpResult{converged:true, method, iterations, nodeVoltages, diagnostics}."

  - id: "dcop_return_failure"
    implemented: true
    attributes: ["dcop"]
    edges_in:
      - from: "dcop_src_sub_solve_failed"
        condition: "all levels failed"
        label: "failure"
    edges_out:
      - to: "engine_ready"
        condition: "always"
        label: "DCOP failed"
    notes: "Returns DcOpResult{converged:false}. Emits dc-op-failed diagnostic. Method: solveDcOperatingPoint() (dc-operating-point.ts:382-403)."

  # === PHASE 1c: Gmin Stepping (Level 1) ===

  - id: "dcop_gmin_stepping"
    implemented: true
    attributes: ["dcop", "level-1"]
    edges_in:
      - from: "dcop_direct_check_converged"
        condition: "!directResult.converged"
        label: "gmin fallback"
    edges_out:
      - to: "dcop_gmin_zero_state"
        condition: "always"
        label: "init gmin"
    notes: "Level 1. Selects dynamic (numGminSteps<=1) or spice3 (>1). Method: solveDcOperatingPoint() (dc-operating-point.ts:312-318)."

  - id: "dcop_gmin_zero_state"
    implemented: true
    attributes: ["dcop", "level-1", "state-vector"]
    edges_in:
      - from: "dcop_gmin_stepping"
        condition: "always"
        label: "zero"
    edges_out:
      - to: "dcop_gmin_sub_solve"
        condition: "always"
        label: "begin loop"
    notes: "Zeros voltages+state0. initMode=initJct. Dynamic: factor=10 oldGmin=1e-2 diagGmin=1e-3. Spice3: diagGmin=gmin*10^N. Method: dynamicGmin()/spice3Gmin()."

  - id: "dcop_gmin_sub_solve"
    implemented: true
    attributes: ["dcop", "level-1"]
    edges_in:
      - from: "dcop_gmin_zero_state"
        condition: "always"
        label: "sub-solve"
      - from: "dcop_gmin_adapt_factor"
        condition: "diagGmin > gtarget"
        label: "next"
      - from: "dcop_gmin_sub_solve_failed"
        condition: "dynamic: factor >= 1.00005"
        label: "retry"
    edges_out:
      - to: "dcop_gmin_sub_solve_check"
        condition: "NR returns"
        label: "check"
    notes: "newtonRaphson with diagonalGmin maxIter=dcTrcvMaxIter. Method: dynamicGmin()/spice3Gmin() (dc-operating-point.ts:473-482/607-613)."

  - id: "dcop_gmin_sub_solve_check"
    implemented: true
    attributes: ["dcop", "level-1"]
    edges_in:
      - from: "dcop_gmin_sub_solve"
        condition: "NR returns"
        label: "check"
    edges_out:
      - to: "dcop_gmin_adapt_factor"
        condition: "converged && diagGmin > gtarget"
        label: "adapt"
      - to: "dcop_gmin_final_clean_solve"
        condition: "converged && diagGmin <= gtarget"
        label: "final"
      - to: "dcop_gmin_sub_solve_failed"
        condition: "!converged"
        label: "failed"
    notes: "Saves snapshot, adapts factor or steps diagGmin/=10. Method: dynamicGmin()/spice3Gmin() (dc-operating-point.ts:484-524/616-629)."

  - id: "dcop_gmin_adapt_factor"
    implemented: true
    attributes: ["dcop", "level-1"]
    edges_in:
      - from: "dcop_gmin_sub_solve_check"
        condition: "converged && diagGmin > gtarget"
        label: "adapt"
    edges_out:
      - to: "dcop_gmin_sub_solve"
        condition: "always"
        label: "next step"
    notes: "Dynamic: iters<=lo factor*=sqrt(factor) cap 10; iters>hi sqrt(factor). Steps diagGmin. Method: dynamicGmin() (dc-operating-point.ts:496-524)."

  - id: "dcop_gmin_sub_solve_failed"
    implemented: true
    attributes: ["dcop", "level-1"]
    edges_in:
      - from: "dcop_gmin_sub_solve_check"
        condition: "!converged"
        label: "failed"
    edges_out:
      - to: "dcop_gmin_sub_solve"
        condition: "dynamic: factor >= 1.00005"
        label: "retry"
      - to: "dcop_source_stepping"
        condition: "factor < 1.00005 or spice3"
        label: "gmin failed"
    notes: "Dynamic: factor=sqrt(sqrt(factor)) restore snapshot. Spice3: no backtrack. Method: dynamicGmin()/spice3Gmin() (dc-operating-point.ts:526-537/617-619)."

  - id: "dcop_gmin_final_clean_solve"
    implemented: true
    attributes: ["dcop", "level-1"]
    edges_in:
      - from: "dcop_gmin_sub_solve_check"
        condition: "converged && diagGmin <= gtarget"
        label: "clean"
    edges_out:
      - to: "dcop_store_result"
        condition: "cleanResult.converged"
        label: "success"
      - to: "dcop_source_stepping"
        condition: "!cleanResult.converged"
        label: "failed"
    notes: "Final NR no diagonal gmin maxIter=100. Method: dynamicGmin()/spice3Gmin() (dc-operating-point.ts:541-555/632-645)."

  # === PHASE 1d: Source Stepping (Level 2) ===

  - id: "dcop_source_stepping"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_gmin_sub_solve_failed"
        condition: "gmin failed"
        label: "src fallback"
      - from: "dcop_gmin_final_clean_solve"
        condition: "clean failed"
        label: "src fallback"
    edges_out:
      - to: "dcop_src_zero_state"
        condition: "always"
        label: "init src"
    notes: "Level 2. Selects gillespie (numSrcSteps<=1) or spice3 (>1). Method: solveDcOperatingPoint() (dc-operating-point.ts:347-377)."

  - id: "dcop_src_zero_state"
    implemented: true
    attributes: ["dcop", "level-2", "state-vector"]
    edges_in:
      - from: "dcop_source_stepping"
        condition: "always"
        label: "zero"
    edges_out:
      - to: "dcop_src_scale_sources"
        condition: "always"
        label: "scale"
    notes: "Zeros voltages+state0. initMode=initJct. Gillespie: scaleAllSources(0). Method: gillespieSrc()/spice3Src() (dc-operating-point.ts:737-742/667-671)."

  - id: "dcop_src_scale_sources"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_src_zero_state"
        condition: "always"
        label: "scale"
      - from: "dcop_src_adapt_raise"
        condition: "raise >= 1e-7 && convFact < 1"
        label: "next"
      - from: "dcop_src_sub_solve_failed"
        condition: "gillespie: gap >= 1e-8"
        label: "retry"
    edges_out:
      - to: "dcop_src_sub_solve"
        condition: "always"
        label: "sub-solve"
    notes: "scaleAllSources(elements, srcFact). Gillespie: adaptive raise init 0.001. Spice3: uniform. Method: gillespieSrc()/spice3Src()."

  - id: "dcop_src_sub_solve"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_src_scale_sources"
        condition: "always"
        label: "sub-solve"
    edges_out:
      - to: "dcop_src_sub_solve_check"
        condition: "NR returns"
        label: "check"
    notes: "newtonRaphson maxIter=dcTrcvMaxIter. Emits dcopSrcSweep. Method: gillespieSrc()/spice3Src() (dc-operating-point.ts:815-821/679-684)."

  - id: "dcop_src_sub_solve_check"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_src_sub_solve"
        condition: "NR returns"
        label: "check"
    edges_out:
      - to: "dcop_src_adapt_raise"
        condition: "converged"
        label: "adapt"
      - to: "dcop_src_sub_solve_failed"
        condition: "!converged"
        label: "failed"
    notes: "Saves snapshot, adapts raise. Gillespie: easy *=1.5, hard *=0.5. Method: gillespieSrc()/spice3Src() (dc-operating-point.ts:823-845/686-696)."

  - id: "dcop_src_adapt_raise"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_src_sub_solve_check"
        condition: "converged"
        label: "adapt"
    edges_out:
      - to: "dcop_src_scale_sources"
        condition: "raise >= 1e-7 && convFact < 1"
        label: "next"
      - to: "dcop_src_final_clean_solve"
        condition: "convFact >= 1"
        label: "done"
    notes: "Iteration-count adaptation. srcFact = convFact+raise clamped to 1. Method: gillespieSrc()/spice3Src()."

  - id: "dcop_src_sub_solve_failed"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_src_sub_solve_check"
        condition: "!converged"
        label: "failed"
    edges_out:
      - to: "dcop_src_scale_sources"
        condition: "gillespie: gap >= 1e-8"
        label: "retry"
      - to: "dcop_return_failure"
        condition: "gap < 1e-8 or spice3"
        label: "failed"
    notes: "Gillespie: raise/=10 cap 0.01, restore snapshot. Spice3: no backtrack. Method: gillespieSrc()/spice3Src() (dc-operating-point.ts:847-863/687-689)."

  - id: "dcop_src_final_clean_solve"
    implemented: true
    attributes: ["dcop", "level-2"]
    edges_in:
      - from: "dcop_src_adapt_raise"
        condition: "convFact >= 1"
        label: "clean"
    edges_out:
      - to: "dcop_store_result"
        condition: "converged"
        label: "success"
      - to: "dcop_return_failure"
        condition: "!converged"
        label: "failed"
    notes: "Gillespie returns if convFact>=1. Spice3: final NR full sources. Method: gillespieSrc()/spice3Src() (dc-operating-point.ts:875-877/700-713)."

  # === PHASE 2: Newton-Raphson Iteration Loop ===

  - id: "nr_initialize_operating_points"
    implemented: true
    attributes: ["nr-loop", "device-load"]
    edges_in:
      - from: "dcop_prime_junctions"
        condition: "DCOP path"
        label: "init OP"
      - from: "transient_stamp_companions"
        condition: "transient path"
        label: "init OP"
    edges_out:
      - to: "nr_stamp_linear"
        condition: "always"
        label: "stamp linear"
    notes: "assembler.updateOperatingPoints sets initial geq/ieq. Method: newtonRaphson() (newton-raphson.ts:422)."

  - id: "nr_stamp_linear"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_initialize_operating_points"
        condition: "always"
        label: "stamp"
    edges_out:
      - to: "nr_capture_linear_rhs"
        condition: "always"
        label: "capture"
    notes: "solver.beginAssembly clears COO+RHS. assembler.stampLinear calls el.stamp for every element. Method: MNAAssembler.stampLinear() (mna-assembler.ts:56-60)."

  - id: "nr_capture_linear_rhs"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_stamp_linear"
        condition: "always"
        label: "capture"
    edges_out:
      - to: "nr_stamp_nonlinear"
        condition: "always"
        label: "nonlinear"
    notes: "Saves linearCooCount. solver.captureLinearRhs snapshots RHS. Method: newtonRaphson() (newton-raphson.ts:429-430)."

  - id: "nr_stamp_nonlinear"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_capture_linear_rhs"
        condition: "iteration == 0"
        label: "first"
      - from: "nr_restore_linear_base"
        condition: "iteration > 0"
        label: "restamp"
    edges_out:
      - to: "nr_stamp_reactive_companion"
        condition: "always"
        label: "companions"
    notes: "assembler.stampNonlinear calls el.stampNonlinear for each nonlinear element. Method: MNAAssembler.stampNonlinear() (mna-assembler.ts:74-80)."

  - id: "nr_stamp_reactive_companion"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_stamp_nonlinear"
        condition: "always"
        label: "companions"
    edges_out:
      - to: "nr_finalize_matrix"
        condition: "always"
        label: "finalize"
    notes: "assembler.stampReactiveCompanion for reactive elements. Method: MNAAssembler.stampReactiveCompanion() (mna-assembler.ts:93-99)."

  - id: "nr_finalize_matrix"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_stamp_reactive_companion"
        condition: "always"
        label: "finalize"
    edges_out:
      - to: "nr_save_linear_base"
        condition: "iteration == 0"
        label: "save base"
      - to: "nr_add_diagonal_gmin"
        condition: "diagonalGmin > 0"
        label: "gmin"
      - to: "nr_lu_factorize"
        condition: "iteration > 0 && diagonalGmin == 0"
        label: "factor"
    notes: "solver.finalize converts COO to CSC. Fast: refill. Slow: rebuild CSC+AMD+symbolic LU. Method: SparseSolver.finalize() (sparse-solver.ts:209-237)."

  - id: "nr_save_linear_base"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_finalize_matrix"
        condition: "iteration == 0"
        label: "save"
    edges_out:
      - to: "nr_add_diagonal_gmin"
        condition: "diagonalGmin > 0"
        label: "gmin"
      - to: "nr_lu_factorize"
        condition: "diagonalGmin == 0"
        label: "factor"
    notes: "solver.saveLinearBase snapshots CSC. Method: newtonRaphson() (newton-raphson.ts:437). Iteration 0 only."

  - id: "nr_add_diagonal_gmin"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_finalize_matrix"
        condition: "diagonalGmin > 0"
        label: "gmin"
      - from: "nr_save_linear_base"
        condition: "diagonalGmin > 0"
        label: "gmin"
    edges_out:
      - to: "nr_lu_factorize"
        condition: "always"
        label: "factor"
    notes: "Adds gmin to every CSC diagonal. Matches ngspice LoadGmin. Method: SparseSolver.addDiagonalGmin() (sparse-solver.ts:346-349)."

  - id: "nr_lu_factorize"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_add_diagonal_gmin"
        condition: "always"
        label: "factor"
      - from: "nr_finalize_matrix"
        condition: "diagonalGmin == 0 && iteration > 0"
        label: "factor"
      - from: "nr_save_linear_base"
        condition: "diagonalGmin == 0"
        label: "factor"
    edges_out:
      - to: "nr_save_state0_for_damping"
        condition: "factorResult.success"
        label: "ok"
      - to: "nr_singular_matrix_abort"
        condition: "!factorResult.success"
        label: "singular"
    notes: "Left-looking sparse LU partial pivoting. Threshold 1e-3 abs 1e-13. Method: SparseSolver.factor() (sparse-solver.ts:239-261)."

  - id: "nr_singular_matrix_abort"
    implemented: true
    attributes: ["nr-loop", "error"]
    edges_in:
      - from: "nr_lu_factorize"
        condition: "!factorResult.success"
        label: "singular"
    edges_out:
      - to: "nr_return_failure"
        condition: "always"
        label: "abort"
    notes: "Emits singular-matrix diagnostic. Method: newtonRaphson() (newton-raphson.ts:494-500)."

  - id: "nr_save_state0_for_damping"
    implemented: true
    attributes: ["nr-loop", "state-vector"]
    edges_in:
      - from: "nr_lu_factorize"
        condition: "factorResult.success"
        label: "save"
    edges_out:
      - to: "nr_sparse_solve"
        condition: "always"
        label: "solve"
    notes: "Copies state0 into oldState0 for DO10 damping. Method: newtonRaphson() (newton-raphson.ts:504-509)."

  - id: "nr_sparse_solve"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_save_state0_for_damping"
        condition: "always"
        label: "solve"
    edges_out:
      - to: "nr_linear_shortcircuit"
        condition: "!hasNonlinear"
        label: "linear"
      - to: "nr_update_operating_points"
        condition: "hasNonlinear"
        label: "update OP"
    notes: "AMD+pivot permute, forward sub L, backward sub U, undo AMD. Method: SparseSolver.solve() (sparse-solver.ts:279-322)."

  - id: "nr_linear_shortcircuit"
    implemented: true
    attributes: ["nr-loop"]
    edges_in:
      - from: "nr_sparse_solve"
        condition: "!hasNonlinear"
        label: "linear"
    edges_out:
      - to: "nr_return_success"
        condition: "always"
        label: "converged"
    notes: "Linear circuit: first solve exact. Method: newtonRaphson() (newton-raphson.ts:519-535)."

  - id: "nr_update_operating_points"
    implemented: true
    attributes: ["nr-loop", "device-load"]
    edges_in:
      - from: "nr_sparse_solve"
        condition: "hasNonlinear"
        label: "update OP"
    edges_out:
      - to: "nr_force_noncon_iter0"
        condition: "iteration == 0"
        label: "force noncon"
      - to: "nr_transient_mode_automaton"
        condition: "iteration > 0"
        label: "mode"
    notes: "el.updateOperatingPoint applies pnjlim/fetlim/limvds recomputes geq/ieq. noncon counts limited. Method: MNAAssembler.updateOperatingPoints() (mna-assembler.ts:116-128)."

  - id: "nr_force_noncon_iter0"
    implemented: true
    attributes: ["nr-loop"]
    edges_in:
      - from: "nr_update_operating_points"
        condition: "iteration == 0"
        label: "force"
    edges_out:
      - to: "nr_transient_mode_automaton"
        condition: "always"
        label: "continue"
    notes: "noncon=1 at iter 0. Guarantees >= 2 iterations. Method: newtonRaphson() (newton-raphson.ts:549-550)."

  - id: "nr_transient_mode_automaton"
    implemented: true
    attributes: ["nr-loop", "mode"]
    edges_in:
      - from: "nr_force_noncon_iter0"
        condition: "always"
        label: "mode"
      - from: "nr_update_operating_points"
        condition: "iteration > 0"
        label: "mode"
    edges_out:
      - to: "nr_node_damping"
        condition: "always"
        label: "damping"
    notes: "initTran+iter0 -> forceReorder+initFloat; initPred -> initFloat. Method: newtonRaphson() (newton-raphson.ts:554-562)."

  - id: "nr_node_damping"
    implemented: true
    attributes: ["nr-loop"]
    edges_in:
      - from: "nr_transient_mode_automaton"
        condition: "always"
        label: "damping"
    edges_out:
      - to: "nr_check_global_convergence"
        condition: "always"
        label: "conv check"
    notes: "If nodeDamping && noncon!=0 && isDcOp && iter>0 and max delta>10V: scale by max(10/maxDelta,0.1). Damps state0. Method: newtonRaphson() (newton-raphson.ts:568-587)."

  - id: "nr_check_global_convergence"
    implemented: true
    attributes: ["nr-loop", "convergence"]
    edges_in:
      - from: "nr_node_damping"
        condition: "always"
        label: "global conv"
    edges_out:
      - to: "nr_check_element_convergence"
        condition: "noncon == 0 && iteration > 0"
        label: "elem check"
      - to: "nr_blame_tracking"
        condition: "noncon > 0 || iteration == 0"
        label: "skip"
    notes: "NIconvTest: tol = reltol*max(|v|,|vPrev|)+absTol. Skipped when noncon>0 or iter==0. Method: newtonRaphson() (newton-raphson.ts:596-614)."

  - id: "nr_check_element_convergence"
    implemented: true
    attributes: ["nr-loop", "convergence"]
    edges_in:
      - from: "nr_check_global_convergence"
        condition: "noncon == 0 && iteration > 0"
        label: "elem conv"
    edges_out:
      - to: "nr_blame_tracking"
        condition: "always"
        label: "blame"
    notes: "el.checkConvergence per element. Short-circuits unless detailedConvergence. Method: MNAAssembler.checkAllConverged() (mna-assembler.ts:141-156)."

  - id: "nr_blame_tracking"
    implemented: true
    attributes: ["nr-loop", "diagnostics"]
    edges_in:
      - from: "nr_check_global_convergence"
        condition: "noncon > 0 || iteration == 0"
        label: "blame"
      - from: "nr_check_element_convergence"
        condition: "always"
        label: "blame"
    edges_out:
      - to: "nr_post_iteration_hook"
        condition: "always"
        label: "hook"
    notes: "Finds element with largest pin voltage delta. Method: newtonRaphson() (newton-raphson.ts:633-651)."

  - id: "nr_post_iteration_hook"
    implemented: true
    attributes: ["nr-loop", "instrumentation"]
    edges_in:
      - from: "nr_blame_tracking"
        condition: "always"
        label: "hook"
    edges_out:
      - to: "nr_dcop_mode_ladder_transition"
        condition: "ladder != null"
        label: "ladder"
      - to: "nr_check_can_converge"
        condition: "ladder == null"
        label: "gate"
    notes: "Calls postIterationHook for harness. Method: newtonRaphson() (newton-raphson.ts:654-655)."

  - id: "nr_dcop_mode_ladder_transition"
    implemented: true
    attributes: ["nr-loop", "dcop", "mode"]
    edges_in:
      - from: "nr_post_iteration_hook"
        condition: "ladder != null"
        label: "ladder"
    edges_out:
      - to: "nr_check_can_converge"
        condition: "always"
        label: "gate"
    notes: "initJct->initFix unconditional forceReorder; initFix->initFloat if noncon==0 AND ladderModeIter>0; initFloat stays. Method: newtonRaphson() (newton-raphson.ts:659-707)."

  - id: "nr_check_can_converge"
    implemented: true
    attributes: ["nr-loop", "convergence"]
    edges_in:
      - from: "nr_dcop_mode_ladder_transition"
        condition: "always"
        label: "gate"
      - from: "nr_post_iteration_hook"
        condition: "ladder == null"
        label: "gate"
    edges_out:
      - to: "nr_return_success"
        condition: "canConverge && globalConverged && elemConverged"
        label: "converged"
      - to: "nr_restore_linear_base"
        condition: "not converged more iterations"
        label: "next"
      - to: "nr_return_failure"
        condition: "not converged exhausted"
        label: "exhausted"
    notes: "With ladder only initFloat. With pool initFloat/transient. No pool always. Method: newtonRaphson() (newton-raphson.ts:712-734)."

  - id: "nr_restore_linear_base"
    implemented: true
    attributes: ["nr-loop", "matrix"]
    edges_in:
      - from: "nr_check_can_converge"
        condition: "not converged more iterations"
        label: "restore"
    edges_out:
      - to: "nr_stamp_nonlinear"
        condition: "always"
        label: "restamp"
    notes: "preIterationHook fires. solver.restoreLinearBase restores CSC+RHS. Method: newtonRaphson() (newton-raphson.ts:473-483)."

  - id: "nr_return_success"
    implemented: true
    attributes: ["nr-loop"]
    edges_in:
      - from: "nr_check_can_converge"
        condition: "converged"
        label: "success"
      - from: "nr_linear_shortcircuit"
        condition: "always"
        label: "linear"
    edges_out:
      - to: "dcop_direct_check_converged"
        condition: "DCOP direct"
        label: "dcop"
      - to: "dcop_gmin_sub_solve_check"
        condition: "gmin stepping"
        label: "gmin"
      - to: "dcop_src_sub_solve_check"
        condition: "source stepping"
        label: "src"
      - to: "transient_nr_converged"
        condition: "transient"
        label: "tran"
    notes: "Returns NRResult{converged:true, iterations, voltages}."

  - id: "nr_return_failure"
    implemented: true
    attributes: ["nr-loop"]
    edges_in:
      - from: "nr_check_can_converge"
        condition: "exhausted"
        label: "exhausted"
      - from: "nr_singular_matrix_abort"
        condition: "always"
        label: "singular"
    edges_out:
      - to: "dcop_direct_check_converged"
        condition: "DCOP direct"
        label: "dcop fail"
      - to: "dcop_gmin_sub_solve_failed"
        condition: "gmin stepping"
        label: "gmin fail"
      - to: "dcop_src_sub_solve_failed"
        condition: "source stepping"
        label: "src fail"
      - to: "transient_nr_failed"
        condition: "transient"
        label: "tran fail"
    notes: "Returns NRResult{converged:false, iterations:maxIterations}."

  # === PHASE 3: Transient Step ===

  - id: "transient_step_entry"
    implemented: true
    attributes: ["transient"]
    edges_in:
      - from: "engine_ready"
        condition: "step() called"
        label: "step"
    edges_out:
      - to: "transient_save_prev_voltages"
        condition: "always"
        label: "save"
    notes: "MNAEngine.step() entry. Method: MNAEngine.step() (analog-engine.ts:256-264)."

  - id: "transient_save_prev_voltages"
    implemented: true
    attributes: ["transient", "state-vector"]
    edges_in:
      - from: "transient_step_entry"
        condition: "always"
        label: "save"
    edges_out:
      - to: "transient_get_clamped_dt"
        condition: "always"
        label: "dt"
    notes: "_prevVoltages.set(_voltages). Saves for rollback. Method: MNAEngine.step() (analog-engine.ts:310)."

  - id: "transient_get_clamped_dt"
    implemented: true
    attributes: ["transient", "timestep"]
    edges_in:
      - from: "transient_save_prev_voltages"
        condition: "always"
        label: "dt"
    edges_out:
      - to: "transient_rotate_delta_old"
        condition: "always"
        label: "rotate"
    notes: "timestep.getClampedDt: clamps to breakpoint. First call t=0 proximity clamp /=10. Method: TimestepController.getClampedDt() (timestep.ts:291-333)."

  - id: "transient_rotate_delta_old"
    implemented: true
    attributes: ["transient", "timestep"]
    edges_in:
      - from: "transient_get_clamped_dt"
        condition: "always"
        label: "rotate"
    edges_out:
      - to: "transient_retry_loop_entry"
        condition: "always"
        label: "loop"
    notes: "Shifts 7 deltaOld slots right [0]=currentDt. Before for(;;). Method: TimestepController.rotateDeltaOld() (timestep.ts:108-114)."

  - id: "transient_retry_loop_entry"
    implemented: true
    attributes: ["transient", "retry-loop"]
    edges_in:
      - from: "transient_rotate_delta_old"
        condition: "first entry"
        label: "first"
      - from: "transient_delmin_check"
        condition: "dt > minTimeStep or first delmin"
        label: "retry"
    edges_out:
      - to: "transient_restore_state0_from_state1"
        condition: "always"
        label: "restore"
    notes: "Top of for(;;) retry loop. NR failure and LTE rejection feed back. Method: MNAEngine.step() (analog-engine.ts:348)."

  - id: "transient_restore_state0_from_state1"
    implemented: true
    attributes: ["transient", "retry-loop", "state-vector"]
    edges_in:
      - from: "transient_retry_loop_entry"
        condition: "always"
        label: "restore"
    edges_out:
      - to: "transient_set_delta_old_current"
        condition: "always"
        label: "delta"
    notes: "state0.set(state1). Restores last accepted state. Method: MNAEngine.step() (analog-engine.ts:349)."

  - id: "transient_set_delta_old_current"
    implemented: true
    attributes: ["transient", "retry-loop", "timestep"]
    edges_in:
      - from: "transient_restore_state0_from_state1"
        condition: "always"
        label: "delta"
    edges_out:
      - to: "transient_advance_sim_time"
        condition: "always"
        label: "advance"
    notes: "deltaOld[0] = dt without shifting. Method: TimestepController.setDeltaOldCurrent() (timestep.ts:120-122)."

  - id: "transient_advance_sim_time"
    implemented: true
    attributes: ["transient", "retry-loop"]
    edges_in:
      - from: "transient_set_delta_old_current"
        condition: "always"
        label: "advance"
    edges_out:
      - to: "transient_predict_voltages"
        condition: "predictor && stepCount > 0"
        label: "predict"
      - to: "transient_stamp_companions"
        condition: "else"
        label: "companions"
    notes: "_simTime += dt. Publishes to timeRef. Method: MNAEngine.step() (analog-engine.ts:355-361)."

  - id: "transient_predict_voltages"
    implemented: true
    attributes: ["transient", "retry-loop", "predictor"]
    edges_in:
      - from: "transient_advance_sim_time"
        condition: "predictor && stepCount > 0"
        label: "predict"
    edges_out:
      - to: "transient_stamp_companions"
        condition: "always"
        label: "companions"
    notes: "computeAgp + predictVoltages. TRAPEZOIDAL predictor. Order 1: linear. Order 2: quadratic. Method: ni-pred.ts:47-209."

  - id: "transient_stamp_companions"
    implemented: true
    attributes: ["transient", "retry-loop"]
    edges_in:
      - from: "transient_predict_voltages"
        condition: "always"
        label: "companions"
      - from: "transient_advance_sim_time"
        condition: "else"
        label: "companions"
    edges_out:
      - to: "nr_initialize_operating_points"
        condition: "always"
        label: "NR"
    notes: "Sets pool.dt. If firsttime: initMode=initTran. el.stampCompanion using integrateCapacitor/integrateInductor. Method: MNAEngine.step() (analog-engine.ts:400-414)."

  - id: "transient_nr_converged"
    implemented: true
    attributes: ["transient"]
    edges_in:
      - from: "nr_return_success"
        condition: "transient"
        label: "NR ok"
    edges_out:
      - to: "transient_set_initmode_initpred"
        condition: "always"
        label: "initPred"
    notes: "Copies nrResult.voltages. Sets timestep.currentDt=dt. Method: MNAEngine.step() (analog-engine.ts:492-493)."

  - id: "transient_set_initmode_initpred"
    implemented: true
    attributes: ["transient", "mode"]
    edges_in:
      - from: "transient_nr_converged"
        condition: "always"
        label: "initPred"
    edges_out:
      - to: "transient_firsttime_copy_state"
        condition: "firsttime && statePool"
        label: "firsttime"
      - to: "transient_update_charge_flux"
        condition: "!firsttime"
        label: "charge"
    notes: "Sets initMode=initPred. Method: MNAEngine.step() (analog-engine.ts:446-447)."

  - id: "transient_firsttime_copy_state"
    implemented: true
    attributes: ["transient", "state-vector"]
    edges_in:
      - from: "transient_set_initmode_initpred"
        condition: "firsttime && statePool"
        label: "firsttime"
    edges_out:
      - to: "transient_update_charge_flux"
