# =============================================================================
# engine-state-machine-schema.yaml
# =============================================================================
# Template for expressing an analog simulation engine's state machine in
# the common unified format. One file per engine (e.g., ngspice.yaml, ours.yaml).
#
# Storage convention:
#   spec/state-machines/schema.yaml          -- this file (the template)
#   spec/state-machines/catalog.yaml         -- unified state/action catalog
#   spec/state-machines/ngspice.yaml         -- ngspice instance
#   spec/state-machines/ours.yaml            -- our TS engine instance
#   spec/state-machines/COMPARISON.md        -- manual diff notes
# =============================================================================

# -- Top-level metadata -------------------------------------------------------
engine:
  name: ""                    # e.g., "ngspice", "digiTS-mna"
  version: ""                 # e.g., "ngspice-43", "v0.9.0"
  source_refs: []             # List of source file paths for this engine
  # e.g., ["src/spice/dctran.c", "src/spice/niiter.c"]

# -- Global parameters --------------------------------------------------------
# Engine-wide constants and their default values. Each entry:
#   name:          snake_case parameter name (descriptive, not engine-specific)
#   value:         default numeric value
#   unit:          physical unit or "dimensionless"
#   role:          1-sentence description of what this parameter controls
#   mapping:       { ngspice: "CKT...", ours: "params...." }
parameters:
  - name: ""
    value: 0
    unit: ""
    role: ""
    mapping: { ngspice: "", ours: "" }

# -- State definitions ---------------------------------------------------------
# Each state corresponds to one entry in the unified catalog (catalog.yaml).
# Only states present_in this engine are listed.
#
# Fields:
#   id:            Must match an id from catalog.yaml
#   implemented:   true | false | "partial" -- whether this engine implements it
#   attributes:    Engine-specific parameter overrides or local variables
#     - name:      Local variable or parameter name
#       value:     Default or initial value
#       role:      What it does in this state
#       mapping:   Engine-specific identifier
#   edges_in:      Conditions that lead INTO this state
#     - from:      Source state id
#       condition:  Boolean/numeric expression as a string
#       label:     Human-readable edge label
#   edges_out:     Conditions that lead OUT of this state
#     - to:        Target state id
#       condition:  Boolean/numeric expression as a string
#       label:     Human-readable edge label
#   notes:         Free-text engine-specific implementation notes

states:
  - id: ""
    implemented: true
    attributes: []
    edges_in: []
    edges_out: []
    notes: ""
