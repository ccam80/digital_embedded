<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>digiTS E2E Harness</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="sim" src="/"></iframe>
  <script>
    /**
     * Relay messages from the simulator iframe to the parent window
     * so Playwright's page.evaluate() can listen for them.
     */
    const pending = [];
    const listeners = [];

    window.__simMessages = pending;

    window.__waitForMessage = (type, timeoutMs = 10000) => {
      // Check if we already have a matching message
      const idx = pending.findIndex(m => m.type === type);
      if (idx !== -1) {
        return Promise.resolve(pending.splice(idx, 1)[0]);
      }
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          reject(new Error(`Timed out waiting for message: ${type}`));
        }, timeoutMs);
        listeners.push({ type, resolve, timer });
      });
    };

    window.addEventListener('message', (e) => {
      if (e.source !== document.getElementById('sim').contentWindow) return;
      const msg = e.data;
      if (typeof msg !== 'object' || msg === null || typeof msg.type !== 'string') return;

      // Check if any listener is waiting for this type
      const idx = listeners.findIndex(l => l.type === msg.type);
      if (idx !== -1) {
        const listener = listeners.splice(idx, 1)[0];
        clearTimeout(listener.timer);
        listener.resolve(msg);
      } else {
        pending.push(msg);
      }
    });

    window.__postToSim = (msg) => {
      document.getElementById('sim').contentWindow.postMessage(msg, '*');
    };
  </script>
</body>
</html>
